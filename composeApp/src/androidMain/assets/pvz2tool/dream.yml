  # 注意：以下路径字段支持 URL（http:// 或 https://），检测到 URL 则直接使用
  assets:
    background: "bg_main.jpg"           # 背景图（支持 URL）
    isUseSolidColorBackground: true
    backgroundMusic: "bg_music.wav"       # 背景音乐（支持 URL）
    isPlayBackgroundMusic: true
    # CG 开场视频路径（相对于 assets/pvz2tool/video，支持 URL）
    cgVideoPath: "opening.mp4"
    # CG 开场视频超时时间，单位毫秒
    cgVideoLoadTimeout: 5000
    # CG 开场视频超时或报错是显示的海报图片
    cgVideoPoster: "bg_main.jpg"

  # ── 音效文件名映射（相对于 assets/pvz2tool/sound/）──
  # 注意：支持 URL（http:// 或 https://），检测到 URL 则直接使用
  sounds:
    # 通用点击/开关（RADIO/CHECKBOX/列表条目等）
    switchClickPress: "ui_switch_click_press.wav"
    switchClickRelease: "ui_switch_click_release.wav"
    switchClick: "ui_switch_click.wav"
    # 普通按钮（PvzButton）
    buttonClickPress: "ui_button_click_press.wav"
    buttonClickRelease: "ui_button_click_release.wav"
    # 设置/编辑类按钮（小齿轮图标等）
    buttonSettingsPress: "ui_button_settings_press.wav"
    buttonSettingsRelease: "ui_button_settings_release.wav"
    # 关闭按钮（X 按钮）
    buttonXClosePress: "ui_button_x_close_press.wav"
    buttonXCloseRelease: "ui_button_x_close_release.wav"
    # 可折叠面板
    collapsiblePanelPress: "ui_collapsible_panel_click_press.wav"
    collapsiblePanelRelease: "ui_collapsible_panel_click_release.wav"

  versionLabel: "版本号："
  uiVersion: "V2.5.1"
  authorInfo: |-
    作者：{{green-shadow:松间烬雪}}
    特别感谢{{link-red-shadow|https://b23.tv/mVOm6n3:@汽水Boy Dream moon.}}制作调试界面
  tutorial: |-
    欢迎使用本应用！以下是详细教程：
    
    1. 联网问题
    最新版联网问题已解决，联网进入游戏若闪屏请狂点下方按钮直到不闪为止
    2. 安装问题
    显示系统不匹配安装失败请使用虚拟机（品牌不限），选安卓5-15任意机型即可
    3. 界面问题
    老版本全屏时会出现经典的令人难绷画面拉伸伸长，所以默认黑边
    4. 电脑版本
    电脑端可以使用安卓模拟器游玩，32位64位系统均可
    5. 音乐包
    音乐包的路径：可以使用es或者mt管理器 根目录/Android/data/com.pop cap.pvz2mgtz/files把音乐包里的egypt.rsb.smf替换进去即可，注意因为源码问题所以只能播放一种音乐，请自行选择
    6. 钻石获取
    钻石打主线关卡或通过活动获取
    7. 其他建议
    执意刷钱的玩家可以洗洗睡了
    
    最后祝玩家游玩愉快！

